version: 1
services:
  - type: web
    name: corporate-reporting
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=. uvicorn api.app:app --host 0.0.0.0 --port 10000
    plan: free
    envVars:
      - key: DB_TYPE
        value: sqlite
      - key: LOG_LEVEL
        value: INFO
    autoDeploy: true
