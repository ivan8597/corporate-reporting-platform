name: Corporate Reporting CI/CD


on:

  push:

    branches:
      - main


  pull_request:

    branches:
      - main



jobs:


  test:


    runs-on: ubuntu-latest


    steps:


    - name: Checkout
      uses: actions/checkout@v4



    - name: Setup Python
      uses: actions/setup-python@v5

      with:

        python-version: "3.12"



    - name: Install dependencies
      run:

        pip install -r requirements.txt



    - name: Ruff check
      run:

        ruff check .



    - name: Run tests
      run:

        pytest



  docker:


    needs: test


    runs-on: ubuntu-latest


    steps:


    - name: Checkout
      uses: actions/checkout@v4



    - name: Docker build
      run:

        docker build -t corporate-reporting .



  deploy:


    needs: docker


    runs-on: ubuntu-latest


    steps:


    - name: Deploy Render

      run: |

        curl ${{ secrets.RENDER_DEPLOY_HOOK }}
